<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gestión Impresoras</title>
  <meta name="theme-color" content="#0f0f1a">
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    :root {
      --bg-picker: #0f0f1a;
      --card-bg: #1a1a2e;
      --text-white: #ffffff;
      --accent: #4f8ef7;
    }
    body {
      background: var(--bg-picker);
      color: var(--text-white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .picker-container {
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .picker-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .picker-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 800;
    }
    .picker-header p {
      opacity: 0.6;
      font-size: 15px;
    }
    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }
    .machine-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .machine-card:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.05);
    }
    .machine-icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }
    .machine-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .machine-sala {
      font-size: 11px;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .loader {
      text-align: center;
      padding: 40px;
      opacity: 0.6;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body>

  <div class="picker-container">
    <div class="picker-header" style="display:flex; justify-content:space-between; align-items:center; text-align:left; gap:20px; margin-bottom: 50px;">
      <div style="flex: 1;">
        <h1>Seleccionar Máquina</h1>
        <p style="margin:0">Elige la impresora que quieres reportar</p>
      </div>
      <button onclick="window.location.href='dashboard.html'" style="background:rgba(79, 142, 247, 0.1); border:1px solid var(--accent); color:var(--accent); padding:10px 16px; border-radius:12px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; white-space: nowrap; flex-shrink: 0;">
        🛡️ Administración
      </button>
    </div>

    <div id="loading" class="loader">
      <p>Cargando impresoras...</p>
    </div>

    <div class="machine-grid" id="machineGrid"></div>

    <div style="margin-top: 60px; text-align: center;">
      <button onclick="window.location.href='dashboard.html'" style="background:none; border:none; color:var(--accent); font-size:13px; cursor:pointer; opacity:0.7">
        🔒 Acceso Administrador
      </button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const client = window.supabaseClient;
      if (!client) return;

      try {
        const { data, error } = await client
          .from('equipos')
          .select('*, salas(nombre)')
          .order('nombre', { ascending: true });

        if (error) throw error;

        const grid = document.getElementById('machineGrid');
        const loading = document.getElementById('loading');
        loading.style.display = 'none';

        data.forEach(m => {
          const card = document.createElement('div');
          card.className = 'machine-card';
          card.onclick = () => window.location.href = `operario.html?maquinaId=${m.id}`;
          
          const sala = m.salas ? m.salas.nombre : 'Sin sala';
          
          card.innerHTML = `
            <span class="machine-icon">🖨️</span>
            <div class="machine-name">${m.nombre}</div>
            <div class="machine-sala">${sala}</div>
          `;
          grid.appendChild(card);
        });

      } catch (err) {
        document.getElementById('loading').innerHTML = '<p style="color:red">Error al cargar datos</p>';
        console.error(err);
      }
    });
  </script>
</body>
</html>

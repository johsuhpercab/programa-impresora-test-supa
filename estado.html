<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Equipos — Gestión Impresoras</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ff4757;
      --warning: #f59e0b;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4f8ef7;
    }

    * { margin: 0; padding: 0; box-box: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 60px 40px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      text-align: left;
      margin-bottom: 80px;
      border-left: 6px solid var(--accent);
      padding-left: 30px;
    }

    header h1 {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    header p {
      color: var(--text-muted);
      font-size: 20px;
      margin-top: 10px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 30px;
    }

    .machine-card {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 30px;
      padding: 40px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
    }

    .machine-card.is-repair {
      border-color: rgba(255, 71, 87, 0.3);
      box-shadow: 0 0 40px rgba(255, 71, 87, 0.05);
    }

    .machine-card.is-operative {
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.05);
    }

    .machine-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .machine-code {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .machine-name {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .machine-sala {
      font-size: 18px;
      color: var(--text-muted);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 900;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 30px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      position: relative;
    }

    .dot::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      background: currentColor;
      filter: blur(8px);
      opacity: 0.8;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.8); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .status-operative { color: var(--success); }
    .status-repair { color: var(--danger); }

    .loader {
      display: flex;
      justify-content: center;
      padding: 100px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header h1 { font-size: 26px; }
      .status-grid { grid-template-columns: 1fr; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>Disponibilidad de Equipos</h1>
    </header>

    <div id="loader" class="loader">
      <div class="spinner"></div>
    </div>

    <div class="status-grid" id="statusGrid">
      <!-- Inyectado por JS -->
    </div>
  </div>

  <script>
    async function loadStatus() {
      try {
        if (!window.supabaseClient) {
          console.warn('Esperando a que el cliente Supabase esté listo...');
          setTimeout(loadStatus, 500);
          return;
        }
        const client = window.supabaseClient;
        
        // Obtenemos máquinas y salas
        const { data: maquinas } = await client
          .from('equipos')
          .select('*, salas(nombre)');

        // Obtenemos incidencias abiertas
        const { data: openInc } = await client
          .from('registros')
          .select('maquina_id')
          .eq('tipo', 'Incidencia')
          .eq('resuelta', false);

        const idsEnReparacion = new Set(openInc.map(i => i.maquina_id));
        
        renderGrid(maquinas, idsEnReparacion);
        document.getElementById('loader').style.display = 'none';
      } catch (err) {
        console.error(err);
      }
    }

    function renderGrid(maquinas, idsEnReparacion) {
      const grid = document.getElementById('statusGrid');
      grid.innerHTML = maquinas.map(m => {
        const enReparacion = idsEnReparacion.has(m.id);
        const statusClass = enReparacion ? 'status-repair' : 'status-operative';
        const cardClass = enReparacion ? 'is-repair' : 'is-operative';
        const statusText = enReparacion ? 'Fuera de Servicio' : 'Disponible';
        const dotColor = enReparacion ? 'var(--danger)' : 'var(--success)';

        return `
          <div class="machine-card ${cardClass}">
            <div class="machine-header">
              <div>
                <div class="machine-name">${m.nombre}</div>
                <div class="machine-sala">📍 ${m.salas?.nombre || 'General'}</div>
              </div>
              <div class="machine-code">${m.codigo || 'S/ID'}</div>
            </div>
            
            <div class="status-indicator ${statusClass}">
              <div class="dot" style="background: ${dotColor}; color: ${dotColor}"></div>
              ${statusText}
            </div>
          </div>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadStatus();
      setInterval(loadStatus, 30000); // Auto-refresco cada 30 segundos
    });
  </script>
</body>
</html>

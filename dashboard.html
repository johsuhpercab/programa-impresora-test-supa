<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Gestión Impresoras</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Sistema de gestión de mantenimiento preventivo para impresoras y máquinas 3D">
  <link rel="stylesheet" href="css/main.css?v=3.3">
  <!-- Supabase, QR SDK & Driver.js (Tour) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
  <script src="js/supabase-config.js?v=3.3"></script>
  <script src="js/dashboard-ui.js?v=3.3"></script>
  <script src="js/admin.js?v=3.3"></script>
  <style>
    /* Guard: ocultar dashboard hasta confirmar sesión */
    #dashboardContent { display: none; }
    .auth-ready #dashboardContent { display: block; }
    .admin-login-overlay { display: none; }
    .auth-locked .admin-login-overlay { display: flex !important; }
  </style>
</head>

<body class="auth-locked">

  <!-- ── Admin Login Overlay ── -->
  <div class="admin-login-overlay" id="adminLoginOverlay">
    <div class="login-card" id="loginCard">
      <span class="login-icon">🔒</span>
      <h2>Panel de Administración</h2>
      <p>Introduce tus credenciales para acceder</p>
      <div class="form-group" style="margin-bottom:12px">
        <input type="email" id="adminEmailInput" class="form-control" placeholder="Email" autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <input type="password" id="adminPassInput" class="form-control" placeholder="Contraseña" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') intentarLogin()">
      </div>
      <button class="btn btn-primary btn-full" onclick="intentarLogin()">Entrar</button>
      <div id="loginError" class="login-error" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- Loader (Desactivado) -->
  <div id="loaderOverlay" style="display:none"></div>

  <!-- El contenido se inyecta dinámicamente aquí por seguridad -->
  <div id="dashboardContent"></div>

</body>

</html>

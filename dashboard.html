<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Gestión – Impresoras y Máquinas 3D</title>
  <meta name="description" content="Sistema de gestión de mantenimiento preventivo para impresoras y máquinas 3D">
  <link rel="stylesheet" href="css/main.css?v=3.1">
  <!-- Supabase, QR SDK & Driver.js (Tour) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.bundle.js"></script>
  <script src="js/supabase-config.js?v=3.1"></script>
  <script src="js/dashboard-ui.js?v=3.1"></script>
  <script src="js/admin.js?v=3.1"></script>
  <script>
    // ── Guard de Seguridad Instantáneo ──
    (function() {
      const pin = localStorage.getItem('admin_pin');
      if (!pin) {
        document.documentElement.classList.add('auth-locked');
      }
    })();
  </script>
  <style>
    .auth-locked #dashboardContent { display: none !important; }
    .auth-locked .admin-login-overlay { display: flex !important; opacity: 1 !important; visibility: visible !important; }
  </style>
</head>

<body>
  
  <!-- ── Admin Login Overlay ── -->
  <div class="admin-login-overlay" id="adminLoginOverlay">
    <div class="login-card" id="loginCard">
      <span class="login-icon">🔒</span>
      <h2>Acceso Restringido</h2>
      <p>Introduce el PIN administrativo para continuar</p>
      <div class="pin-input-group">
        <input type="password" id="adminPinInput" class="pin-input" maxlength="6" placeholder="••••" inputmode="numeric">
      </div>
      <button class="btn btn-primary btn-full" onclick="intentarLogin()">Entrar</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- Loader (Desactivado) -->
  <div id="loaderOverlay" style="display:none"></div>

  <!-- El contenido se inyecta dinámicamente aquí por seguridad -->
  <div id="dashboardContent"></div>

</body>

</html>
